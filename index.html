        <meta charset="utf-8">

        <title></title>

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <style>
        /*I wouldn't normally use a style block, but the idea was to build something quick and to the pointless.*/
          @font-face {
            font-family: 'icomoon';
            src:url('fonts/icomoon.eot?-4f16u2');
            src:url('fonts/icomoon.eot?#iefix-4f16u2') format('embedded-opentype'),
              url('fonts/icomoon.woff?-4f16u2') format('woff'),
              url('fonts/icomoon.ttf?-4f16u2') format('truetype'),
              url('fonts/icomoon.svg?-4f16u2#icomoon') format('svg');
            font-weight: normal;
            font-style: normal;
          }

          [class^="icon-"], [class*=" icon-"] {
            font-family: 'icomoon';
            speak: none;
            font-style: normal;
            font-weight: normal;
            font-variant: normal;
            text-transform: none;
            line-height: 1;

            /* Better Font Rendering =========== */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
          }

          .icon-bullhorn:before {
            content: "\e600";
          }

          html, body {
            overflow: hidden;
            background: #fff; }

          .hole {
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 2;}

          i {
            display: block;
            position: absolute;
            width: 340px;
            height: 340px;
            left: -170px;
            top: -170px;
            border-radius: 340px;
            opacity: 0;
          
            animation-name: scale;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: linear; }

          i:nth-child(1) {
            animation-delay: 0.3s; }

          i:nth-child(2) {
            animation-delay: 0.6s; }

          i:nth-child(3) {
            animation-delay: 0.9s; }

          i:nth-child(4) {
            animation-delay: 1.2s; }

          i:nth-child(5) {
            animation-delay: 1.5s; }

          @keyframes scale {

            100% {
              transform: scale(4);
              opacity: 0;
              box-shadow: 0px 0px 50px rgba(17, 119, 85, 0.5); }


            50% {
              transform: scale(2) translate(0px, -5px);
              opacity: 1;
              box-shadow: 0px 8px 20px rgba(17, 119, 85, 0.5); }


            0% {
              transform: scale(0.1) translate(0px, 5px);
              opacity: 0;
              box-shadow: 0px 10px 20px rgba(17, 119, 85, 0); } }

          span {
            transform: rotate(-20deg) !important;
            display: inline-block;
            font-size: 99px;
            position: relative;
            top: -45px;
            left: -45px;
            color: #6ba;
          }
      </style>
      <script src="bower_components/prefixfree/prefixfree.min.js"></script>

    </head>
