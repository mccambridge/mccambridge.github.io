<!DOCTYPE html>

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <style>
          html, body {
            overflow: hidden;
            background: #fff; }

          .hole {
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 2; }

          i {
            display: block;
            position: absolute;
            width: 340px;
            height: 340px;
            left: -170px;
            top: -170px;
            border-radius: 340px;
            opacity: 0;
            animation-name: scale;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: linear; }

          i:nth-child(1) {
            animation-delay: 0.3s; }

          i:nth-child(2) {
            animation-delay: 0.6s; }

          i:nth-child(3) {
            animation-delay: 0.9s; }

          i:nth-child(4) {
            animation-delay: 1.2s; }

          i:nth-child(5) {
            animation-delay: 1.5s; }

          i:nth-child(6) {
            animation-delay: 1.8s; }

          i:nth-child(7) {
            animation-delay: 2.1s; }

          i:nth-child(8) {
            animation-delay: 2.4s; }

          i:nth-child(9) {
            animation-delay: 2.7s; }

          i:nth-child(10) {
            animation-delay: 3s; }

          @keyframes scale {

            100% {
              transform: scale(4);
              opacity: 0;
              box-shadow: 0px 0px 50px rgba(17, 119, 85, 0.5); }


            50% {
              transform: scale(2) translate(0px, -5px);
              opacity: 1;
              box-shadow: 0px 8px 20px rgba(17, 119, 85, 0.5); }


            0% {
              transform: scale(0.1) translate(0px, 5px);
              opacity: 0;
              box-shadow: 0px 10px 20px rgba(17, 119, 85, 0); } }
      </style>

    </head>
